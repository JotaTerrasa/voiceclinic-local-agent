<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VoiceClinic Local</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --ink: #1e2732;
        --muted: #637083;
        --line: #d8dee8;
        --accent: #0d7c66;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        border-right: 1px solid var(--line);
        background: var(--panel);
        padding: 20px;
      }

      section {
        padding: 20px;
      }

      h1,
      h2 {
        margin: 0 0 14px;
        font-size: 18px;
        letter-spacing: 0;
      }

      h2 {
        margin-top: 24px;
        font-size: 14px;
        text-transform: uppercase;
        color: var(--muted);
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 11px;
        background: #fff;
        color: var(--ink);
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.danger {
        color: var(--danger);
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .row > * {
        flex: 1;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .log {
        display: grid;
        gap: 10px;
        max-width: 900px;
      }

      .message {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
      }

      .message strong {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
      }

      .table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--line);
      }

      .table th,
      .table td {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        font-size: 14px;
      }

      .table th {
        color: var(--muted);
        font-weight: 600;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 800px) {
        main {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>VoiceClinic Local</h1>
        <div class="stack">
          <div>
            <label for="phone">Paciente</label>
            <input id="phone" value="+34600111222" />
          </div>
          <div>
            <label for="message">Mensaje</label>
            <textarea id="message">Quiero una cita de cardiologia manana a las 10</textarea>
          </div>
          <div class="row">
            <button class="primary" id="send">Enviar</button>
            <button id="record">Grabar</button>
          </div>
          <button class="danger" id="reset">Reset demo</button>
          <div class="status" id="status"></div>
        </div>
        <h2>Citas</h2>
        <div id="appointments"></div>
      </aside>
      <section>
        <div class="log" id="log"></div>
      </section>
    </main>
    <script>
      const api = "";
      const log = document.querySelector("#log");
      const status = document.querySelector("#status");
      const phone = document.querySelector("#phone");
      const message = document.querySelector("#message");
      const appointments = document.querySelector("#appointments");
      let recorder;
      let chunks = [];

      function addMessage(role, text) {
        const item = document.createElement("div");
        item.className = "message";
        item.innerHTML = `<strong>${role}</strong><div>${text}</div>`;
        log.prepend(item);
      }

      async function refreshAppointments() {
        const response = await fetch(`${api}/appointments?phone=${encodeURIComponent(phone.value)}`);
        const data = await response.json();
        if (!data.length) {
          appointments.innerHTML = '<div class="status">Sin citas activas</div>';
          return;
        }
        appointments.innerHTML = `<table class="table">
          <thead><tr><th>Fecha</th><th>Doctor</th><th>Estado</th></tr></thead>
          <tbody>${data.map((item) => `<tr><td>${item.starts_at.replace("T", " ")}</td><td>${item.doctor_name}</td><td>${item.status}</td></tr>`).join("")}</tbody>
        </table>`;
      }

      async function sendText() {
        status.textContent = "Procesando";
        const text = message.value.trim();
        addMessage("Paciente", text);
        const response = await fetch(`${api}/agent/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, patient_phone: phone.value }),
        });
        const data = await response.json();
        addMessage("Agente", data.text);
        status.textContent = data.action;
        await refreshAppointments();
      }

      async function sendAudio(blob) {
        status.textContent = "Transcribiendo";
        const form = new FormData();
        form.append("audio", blob, "turn.webm");
        form.append("patient_phone", phone.value);
        const response = await fetch(`${api}/voice/turn`, { method: "POST", body: form });
        if (!response.ok) {
          status.textContent = "STT/TTS no configurado";
          return;
        }
        const data = await response.json();
        addMessage("Paciente", data.transcript);
        addMessage("Agente", data.text);
        if (data.audio_url) {
          new Audio(data.audio_url).play();
        }
        status.textContent = data.action;
        await refreshAppointments();
      }

      document.querySelector("#send").addEventListener("click", sendText);
      document.querySelector("#reset").addEventListener("click", async () => {
        await fetch(`${api}/demo/reset`, { method: "POST" });
        log.innerHTML = "";
        status.textContent = "Demo reiniciada";
        await refreshAppointments();
      });
      document.querySelector("#record").addEventListener("click", async () => {
        if (recorder && recorder.state === "recording") {
          recorder.stop();
          return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (event) => chunks.push(event.data);
        recorder.onstop = () => {
          stream.getTracks().forEach((track) => track.stop());
          sendAudio(new Blob(chunks, { type: "audio/webm" }));
        };
        recorder.start();
        status.textContent = "Grabando";
      });

      refreshAppointments();
    </script>
  </body>
</html>
