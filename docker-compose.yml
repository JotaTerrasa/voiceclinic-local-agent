services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

  voiceclinic:
    build: .
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
      VOICECLINIC_DB: /app/data/clinic.db
    ports:
      - "8000:8000"
      - "9092:9092"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - ollama

volumes:
  ollama:
