<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">VoiceClinic Local Agent architecture</title>
  <desc id="desc">Architecture diagram showing local channels, LangGraph orchestration, guardrails, scheduling, Ollama, SQLite, and local voice components.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-slate" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#475569"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      .title { fill: #0f172a; font-size: 58px; font-weight: 780; }
      .subtitle { fill: #475569; font-size: 27px; font-weight: 450; }
      .section { fill: #334155; font-size: 21px; font-weight: 760; text-transform: uppercase; }
      .node-title { fill: #0f172a; font-size: 27px; font-weight: 760; }
      .node-text { fill: #475569; font-size: 19px; font-weight: 450; }
      .tiny { fill: #64748b; font-size: 17px; font-weight: 520; }
      .badge { fill: #0f172a; font-size: 17px; font-weight: 720; }
      .arrow-label { fill: #475569; font-size: 17px; font-weight: 620; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <path d="M0 0 H1600 V210 H0 Z" fill="#eef6ff"/>
  <path d="M0 210 C260 250 455 158 730 205 C1000 250 1225 235 1600 180 V0 H0 Z" fill="#e0f2fe" opacity="0.62"/>

  <text x="96" y="104" class="title">VoiceClinic Local Agent</text>
  <text x="100" y="148" class="subtitle">Local-first AI voice agent for healthcare appointment workflows</text>

  <g transform="translate(1052 78)">
    <rect x="0" y="0" width="132" height="44" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="66" y="29" text-anchor="middle" class="badge" fill="#1d4ed8">Ollama</text>
    <rect x="148" y="0" width="154" height="44" rx="8" fill="#ccfbf1" stroke="#5eead4"/>
    <text x="225" y="29" text-anchor="middle" class="badge" fill="#0f766e">LangGraph</text>
    <rect x="318" y="0" width="126" height="44" rx="8" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="381" y="29" text-anchor="middle" class="badge" fill="#b45309">LiveKit</text>
  </g>

  <g transform="translate(92 230)">
    <text x="0" y="0" class="section">Inputs</text>
    <g transform="translate(0 28)" filter="url(#shadow)">
      <rect width="255" height="430" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
      <g transform="translate(28 36)">
        <circle cx="28" cy="28" r="28" fill="#dbeafe"/>
        <path d="M20 29 h16 M28 21 v16" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
        <text x="74" y="27" class="node-title">Patient request</text>
        <text x="74" y="55" class="node-text">Appointment calls</text>
      </g>
      <g transform="translate(28 128)">
        <rect width="198" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="22" y="38" class="node-title" font-size="22">Web demo</text>
      </g>
      <g transform="translate(28 206)">
        <rect width="198" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="22" y="38" class="node-title" font-size="22">REST API</text>
      </g>
      <g transform="translate(28 284)">
        <rect width="198" height="60" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="22" y="31" class="node-title" font-size="22">SIP</text>
        <text x="22" y="52" class="node-text" font-size="16">Asterisk AudioSocket</text>
      </g>
    </g>
  </g>

  <g transform="translate(425 230)">
    <text x="0" y="0" class="section">Voice transport</text>
    <g transform="translate(0 28)" filter="url(#shadow)">
      <rect width="285" height="430" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
      <g transform="translate(28 38)">
        <text x="0" y="0" class="node-title">Channel layer</text>
        <text x="0" y="31" class="node-text">Transport is replaceable.</text>
        <text x="0" y="58" class="node-text">Domain logic stays shared.</text>
      </g>
      <g transform="translate(28 130)">
        <rect width="229" height="74" rx="14" fill="#eef6ff" stroke="#bfdbfe"/>
        <text x="20" y="31" class="node-title" font-size="22">LiveKit-ready</text>
        <text x="20" y="55" class="node-text" font-size="17">LangChain LLMAdapter</text>
      </g>
      <g transform="translate(28 226)">
        <rect width="229" height="74" rx="14" fill="#f0fdfa" stroke="#99f6e4"/>
        <text x="20" y="31" class="node-title" font-size="22">Local STT</text>
        <text x="20" y="55" class="node-text" font-size="17">faster-whisper</text>
      </g>
      <g transform="translate(28 322)">
        <rect width="229" height="74" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
        <text x="20" y="31" class="node-title" font-size="22">Local TTS</text>
        <text x="20" y="55" class="node-text" font-size="17">Piper optional</text>
      </g>
    </g>
  </g>

  <g transform="translate(790 214)">
    <text x="0" y="0" class="section">Agent orchestration</text>
    <g transform="translate(0 44)" filter="url(#shadow)">
      <rect width="370" height="462" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="32" y="52" class="node-title">ClinicAgent</text>
      <text x="32" y="82" class="node-text">Shared business workflow</text>

      <g transform="translate(32 126)">
        <rect width="306" height="72" rx="14" fill="#fef2f2" stroke="#fecaca"/>
        <text x="22" y="31" class="node-title" font-size="21">1. Guardrail observer</text>
        <text x="22" y="55" class="node-text" font-size="17">Interrupts emergency risk</text>
      </g>
      <g transform="translate(32 222)">
        <rect width="306" height="72" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
        <text x="22" y="31" class="node-title" font-size="21">2. Intent extraction</text>
        <text x="22" y="55" class="node-text" font-size="17">Rules or local LLM</text>
      </g>
      <g transform="translate(32 318)">
        <rect width="306" height="72" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
        <text x="22" y="31" class="node-title" font-size="21">3. Tool execution</text>
        <text x="22" y="55" class="node-text" font-size="17">Book, reschedule, cancel</text>
      </g>

      <path d="M185 198 V222" stroke="#475569" stroke-width="4" marker-end="url(#arrow-slate)"/>
      <path d="M185 294 V318" stroke="#475569" stroke-width="4" marker-end="url(#arrow-slate)"/>
      <text x="32" y="430" class="tiny">LangGraph state: messages + appointment metadata</text>
    </g>
  </g>

  <g transform="translate(1252 230)">
    <text x="0" y="0" class="section">Local services</text>
    <g transform="translate(0 28)" filter="url(#shadow)">
      <rect width="255" height="430" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
      <g transform="translate(28 40)">
        <rect width="199" height="86" rx="16" fill="#eef6ff" stroke="#bfdbfe"/>
        <text x="20" y="35" class="node-title" font-size="23">Ollama</text>
        <text x="20" y="61" class="node-text" font-size="17">Qwen3 30B on 4090</text>
      </g>
      <g transform="translate(28 158)">
        <rect width="199" height="86" rx="16" fill="#f0fdf4" stroke="#bbf7d0"/>
        <text x="20" y="35" class="node-title" font-size="23">SQLite</text>
        <text x="20" y="61" class="node-text" font-size="17">Patients, slots, visits</text>
      </g>
      <g transform="translate(28 276)">
        <rect width="199" height="86" rx="16" fill="#faf5ff" stroke="#e9d5ff"/>
        <text x="20" y="35" class="node-title" font-size="23">FastAPI</text>
        <text x="20" y="61" class="node-text" font-size="17">Demo and REST surface</text>
      </g>
    </g>
  </g>

  <path d="M350 474 C378 474 392 474 420 474" stroke="#2563eb" stroke-width="5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="374" y="452" text-anchor="middle" class="arrow-label">turn</text>

  <path d="M713 474 C744 474 754 474 784 474" stroke="#2563eb" stroke-width="5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="748" y="452" text-anchor="middle" class="arrow-label">text / audio</text>

  <path d="M1162 400 C1196 350 1213 326 1248 306" stroke="#0f766e" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="1214" y="342" class="arrow-label">LLM</text>
  <path d="M1162 500 C1198 520 1216 540 1248 600" stroke="#0f766e" stroke-width="5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="1194" y="556" class="arrow-label">data</text>

  <g transform="translate(170 775)">
    <rect x="0" y="0" width="1260" height="54" rx="12" fill="#0f172a"/>
    <text x="630" y="35" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="690">
      Local-first: no hosted voice-agent platform required for the core demo
    </text>
  </g>
</svg>
